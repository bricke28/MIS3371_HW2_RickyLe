    Purpose: MIS 3371 Homework 2, adding onto current patient registration form with new fields, validation, and a review section before submission.

<html>
<!-- Load external CSS styles and javascript-->
<head>
    <meta charset="UTF-8">
    <title>I-Fast Care Patient Registration v2</title>
    <link rel="stylesheet" href="MIS3371hw2Rlstyle.css">
    <script src="MIS3371hw2Rlscript.js" defer></script>
</head>
<!-- Header information -->

<body>
    <div class="header-container">
        <div class="logo-name">
            <img src="hospitallogo.png" alt="I-Fast Care Logo" id="logo">
            <span class="company-title">I-Fast Care Medical</span>
        </div>
        <div id="date-display"></div>
    </div>
 <!-- Form fields for patient registration -->
    <div id="main-content">
        <form id="patientForm" onsubmit="return validatePasswords()" action="MIS3371thankyoupage.html" method="GET">
            <table>
                <tr>
                    <td><label>Full Name*:</label></td>
                    <td>
                        <input type="text" name="firstname" placeholder="First Name" title="Letters, apostrophes, and dashes only (1-30 chars)" pattern="[A-Za-z'-]{1,}" maxlength="30" required>
                        <input type="text" name="mi" placeholder="MI" title="Single letter only" pattern="[A-Za-z]{1}" style="width: 30px;">
                        <input type="text" name="lastname" placeholder="Last Name" title="Letters, dashes, and numbers 2-5 only" pattern="[A-Za-z'2-5-]{1,}" maxlength="30" required>
                    </td>
                </tr>
                <tr>
                    <td><label>Date of Birth*:</label></td>
                    <td>
                        <input type="date" id="dob" name="dob" required title="Must not be in the future or >120 years ago">
                    </td>
                </tr>
                <tr>
                    <td><label>ID / Social*:</label></td>
                    <td><input type="password" name="ssn" placeholder="xxx-xx-xxxx" pattern="\d{3}-\d{2}-\d{4}" title="Format: 000-00-0000" required></td>
                </tr>

                <tr>
                    <td><label>Email / Phone*:</label></td>
                    <td>
                        <input type="email" name="email" placeholder="name@domain.tld" title="Valid email format" required>
                        <input type="tel" name="phone" placeholder="000-000-0000" pattern="\d{3}-\d{3}-\d{4}" title="Format: 000-000-0000" required>
                    </td>
                </tr>

                <tr>
                    <td><label>Address*:</label></td>
                    <td>
                        <input type="text" name="addr1" placeholder="Address 1" minlength="2" maxlength="30" required>
                        <input type="text" name="addr2" placeholder="Address 2 (Optional)" maxlength="30">
                        <br>
                        <input type="text" name="city" placeholder="City" minlength="2" required>
                        <select name="state" placeholder="State" title="Please select a state" required>
                            <option value="Please select your state"></option>
                            <option value="AL">Alabama</option>
                            <option value="AK">Alaska</option>`
                            <option value="AZ">Arizona</option>
                            <option value="AR">Arkansas</option>
                            <option value="CA">California</option>
                            <option value="CO">Colorado</option>
                            <option value="CT">Connecticut</option>
                            <option value="DE">Delaware</option>
                            <option value="DC">District Of Columbia</option>
                            <option value="FL">Florida</option>
                            <option value="GA">Georgia</option>
                            <option value="HI">Hawaii</option>
                            <option value="ID">Idaho</option>
                            <option value="IL">Illinois</option>
                            <option value="IN">Indiana</option>
                            <option value="IA">Iowa</option>
                            <option value="KS">Kansas</option>
                            <option value="KY">Kentucky</option>
                            <option value="LA">Louisiana</option>
                            <option value="ME">Maine</option>
                            <option value="MD">Maryland</option>
                            <option value="MA">Massachusetts</option>
                            <option value="MI">Michigan</option>
                            <option value="MN">Minnesota</option>
                            <option value="MS">Mississippi</option>
                            <option value="MO">Missouri</option>
                            <option value="MT">Montana</option>
                            <option value="NE">Nebraska</option>
                            <option value="NV">Nevada</option>
                            <option value="NH">New Hampshire</option>
                            <option value="NJ">New Jersey</option>
                            <option value="NM">New Mexico</option>
                            <option value="NY">New York</option>
                            <option value="NC">North Carolina</option>
                            <option value="ND">North Dakota</option>
                            <option value="OH">Ohio</option>
                            <option value="OK">Oklahoma</option>
                            <option value="OR">Oregon</option>
                            <option value="PA">Pennsylvania</option>
                            <option value="RI">Rhode Island</option>
                            <option value="SC">South Carolina</option>
                            <option value="SD">South Dakota</option>
                            <option value="TN">Tennessee</option>
                            <option value="TX">Texas</option>
                            <option value="UT">Utah</option>
                            <option value="VT">Vermont</option>
                            <option value="VA">Virginia</option>
                            <option value="WA">Washington</option>
                            <option value="WV">West Virginia</option>
                            <option value="WI">Wisconsin</option>
                            <option value="WY">Wyoming</option>
                            </select>
                        <input type="text" id="zip" name="zip" placeholder="Zip" pattern="\d{5}(-\d{4})?" title="5 digits or 5+4 format" required>
                    </td>
                </tr>

                <tr>
                    <td><label>Desired Salary Range*:</label></td>
                    <td>
                        $20k <input type="range" id="salaryRange" name="salary" min="20000" max="200000" step="5000" oninput="updateSalaryDisplay(this.value)"> $200k
                        <span id="salaryDisplay">$110,000</span>
                    </td>
                </tr>

                <tr>
                    <td><label>User ID*:</label></td>
                    <td>
                        <input type="text" id="userid" name="userid" title="5-30 chars, no spaces, starts with letter" pattern="[A-Za-z][A-Za-z0-0_-]{4,29}" onblur="this.value=this.value.toLowerCase()" required>
                    </td>
                </tr>
                <tr>
                    <td><label>Password*:</label></td>
                    <td><input type="password" id="pw1" name="password" minlength="8" maxlength="30" pattern="(?=.*[A-Z])(?=.*[a-z])(?=.*[0-9])(?=.*[!@#$%^&*]).{8,}" title="Min 8 chars: 1 Upper, 1 Lower, 1 Number, 1 Special (!@#$%^&*). No quotes." required></td>
                </tr>
                <tr>
                    <td><label>Confirm Password*:</label></td>
                    <td><input type="password" id="pw2" required></td>
                </tr>

                <tr>
                    <td><label>How are you feeling? (1-10)*:</label></td>
                    <td>1 <input type="range" name="daysofar" min="1" max="10" required> 10</td>
                </tr>
                <tr>
                    <td><label>Please describe your symptoms:</label></td>
                    <td><textarea name="symptoms" rows="3" cols="50"></textarea></td>
                </tr>
                <tr>
                    <td><label>Medical History:</label></td>
                    <td>
                        <input type="checkbox" name="history" value="diabetes"> Diabetes
                        <input type="checkbox" name="history" value="hypertension"> Hypertension
                        <input type="checkbox" name="history" value="asthma" > Asthma
                        <input type="checkbox" name="history" value="cholesterol"> High Cholesterol
                        <input type="checkbox" name="history" value="heart"> Heart Disease
                    </td>
                </tr>
                <tr>
                    <td><label>Gender:*</label></td>
                    <td>
                        <input type="radio" name="gender" value="male" required> Male
                        <input type="radio" name="gender" value="female" required> Female
                        <input type="radio" name="gender" value="other" required> Other
                    </td>
                </tr>
                <tr>
                    <td><label>Are you sexually active?*:</label></td>
                    <td>
                        <input type="radio" name="sexuallyActive" value="yes" required> Yes
                        <input type="radio" name="sexuallyActive" value="no" required> No
                    </td>
                </tr>
                <tr>
                    <td><label>In the past 12 months, have you drank or done any drugs?*:</label></td>
                    <td>
                        <input type="radio" name="drugs" value="drank" required> Drank
                        <input type="radio" name="drugs" value="drugs" required> Drugs
                        <input type="radio" name="drugs" value="both" required> Both
                        <input type="radio" name="drugs" value="none" required> None
                    </td>
                </tr>
                <tr>
                    <td><label>Are you depressed or have you had any suicidal thoughts recently?*:</label></td>
                    <td>
                        <input type="radio" name="depression" value="yes" required> Yes
                        <input type="radio" name="depression" value="no" required> No
                    </td>
                </tr>
                <tr>
                    <td colspan="2" style="text-align: center;">
                        <button type="button" onclick="generateReview()">REVIEW</button>
                        <input type="submit" value="Submit">
                        <input type="reset" value="CLEAR">
                    </td>
                </tr>
            </table>
            <!-- End of Form fields for patient registration -->
        </form>
    </div>
<!-- Footer information -->
    <div id="footer">
        <p>PO BOX 18293, Sugarland, TX 77496</p>
        <button onclick="alert('Contacting support...')">Contact Us</button>
    </div>

</body>

<!-- Review content-->
</html>
            </table>
        </form>

        <div id="review-area" style="display:none; margin-top: 20px; border-top: 2px solid #db0000; padding: 20px;">
            <h3>PLEASE REVIEW THIS INFORMATION</h3>
            <div id="review-content"></div>
        </div>
    </div>
    
</body>
</html>
